  lb:
    deploy:
      replicas: 3
    image: 927technology/lb:210521
    stdin_open: true
    tty: true 
    environment:
      - role=lb
    hostname: lb
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.1.201:514"
        tag: "{{.Name}}/{{.ID}}"
    ports:
      - 80:80/tcp
    volumes:
      - ./config/lb/etc/haproxy/haproxy.cfg:/etc/haproxy/haproxy.cfg
  ms:
    deploy:
      replicas: 3
    image: 927technology/ops:210521
    stdin_open: true
    tty: true 
    environment:
      - role=management
    hostname: ms
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.1.201:514"
        tag: "{{.Name}}/{{.ID}}"
    volumes:
      - ./config/ms/etc/nagios:/etc/nagios
      - ../local/shared/usr/lib64/nagios/rw:/usr/lib64/nagios/rw
#      - ./config/shared/usr/lib64/nagios/rw:/usr/lib64/nagios/rw
      - ./config/shared/var/spool/nagios:/var/spool/nagios
      - ./config/shared/var/log:/var/log
      - ./config/shared/usr/local/pnp4nagios/var/perfdata:/usr/local/pnp4nagios/var/perfdata
      - ./config/ms/etc/mod_gearman:/etc/mod_gearman
      - ./config/ms/etc/xinetd.d/livestatus:/etc/xinetd.d/livestatus
