  trap:
    image: 927technology/ops:210521
    stdin_open: true
    tty: true 
    environment:
      - role=trap
    hostname: trap
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.1.201:514"
        tag: "{{.Name}}/{{.ID}}"
    ports:
      - 162:162/tcp
      - 162:162/udp
    volumes:
      - ./config/shared/var/spool/nagios:/var/spool/nagios
      - ./config/shared/var/log:/var/log
      - ./config/shared/var/spool/snmptt:/var/spool/snmptt
      - ./config/trap/etc/snmp:/etc/snmp
      - ./config/trap/usr/share/snmp/mibs:/usr/share/snmp/mibs2
  web:
#    deploy:
#      replicas: 3
    image: 927technology/ops:210521
    stdin_open: true
    tty: true 
    environment:
      - role=web
    hostname: web
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.1.201:514"
        tag: "{{.Name}}/{{.ID}}"
    ports:
      - 8000:80/tcp
    volumes:
      - ../local/shared/usr/lib64/nagios/rw:/usr/lib64/nagios/rw
#      - ./config/shared/usr/lib64/nagios/rw:/usr/lib64/nagios/rw
      - ./config/web/etc/httpd/conf:/etc/httpd/conf
      - ./config/web/etc/httpd/conf.d:/etc/httpd/conf.d
      - ./config/shared/var/log:/var/log
      - ./config/shared/usr/local/pnp4nagios/var/perfdata:/usr/local/pnp4nagios/var/perfdata
      - ./config/web/etc/thruk:/etc/thruk
  wkr01:
    image: 927technology/ops:210521
    stdin_open: true
    tty: true 
    environment:
      - role=worker
    hostname: wkr01
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.1.201:514"
        tag: "{{.Name}}/{{.ID}}"
    volumes:
      - ./config/shared/usr/lib64/nagios/plugins:/usr/lib64/nagios/plugins
      - ./config/shared/var/log:/var/log
      - ./config/wkr/etc/mod_gearman:/etc/mod_gearman
